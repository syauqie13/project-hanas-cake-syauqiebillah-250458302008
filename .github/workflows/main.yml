name: Deploy Laravel Otomatis

on:
  push:
    branches:
      - main  # Pastikan sesuai dengan nama branch utama lu

jobs:
  web-deploy:
    name: Sync Files
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode Terbaru
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 📂 Step 1:Kirim Logic (Controller, Views, Routes)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          timeout: 120000
          max-parallel: 1
          exclude: |
            **/public/**
            **/vendor/**
            **/node_modules/**
            .env
            bootstrap/cache/**

      - name: 📂 Step 2:Update Tampilan Otomatis (CSS, JS, Images)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          security: loose
          timeout: 120000
          max-parallel: 1
          local-dir: public/
          server-dir: public_html/
          # KUNCI UTAMANYA DISINI:
          exclude: |
            assets/modules/**