name: Deploy Laravel FTP

on:
push:
branches: [ test1 ]

jobs:
web-deploy:
name: 🎉 Deploy
runs-on: ubuntu-latest

steps:
  - name: 🚚 Checkout code
    uses: actions/checkout@v4

  - name: 📦 Install Composer (optional tapi disarankan)
    run: composer install --no-dev --optimize-autoloader

  - name: 📂 FTP Deploy
    uses: SamKirkland/FTP-Deploy-Action@v4.3.5
    with:
      server: ${{ secrets.FTP_SERVER }}
      username: ${{ secrets.FTP_USERNAME }}
      password: ${{ secrets.FTP_PASSWORD }}
      server-dir: /public_html/api/   # sesuaikan
      exclude: |
        **/.git*
        **/node_modules/**
        **/tests/**
        **/.env
        storage/logs/**
```
