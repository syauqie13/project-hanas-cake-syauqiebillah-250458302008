name: AssetFlow

on:
  push:
    branches:
      - test1

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 151.243.222.70
          username: test@arcueia.my.id
          # WAJIB gunakan rahasia (secrets) untuk password
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/   # SESUAIKAN dengan folder subdomain kamu
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
